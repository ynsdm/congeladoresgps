<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrando Congelador...</title>
</head>
<body>
    <h2>Procesando tu escaneo...</h2>
    <p id="estado">Obteniendo ubicación...</p>

    <script>
        // para obtener la ubicacion
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(enviarDatos, manejarError);
            } else {
                document.getElementById("estado").innerText = "Tu navegador no soporta geolocalización.";
            }
        };

        function enviarDatos(posicion) {
            const latitud = posicion.coords.latitude;
            const longitud = posicion.coords.longitude;
            
            // Obtenemos el ID del código desde la URL (ej: miweb.com?codigo=A123)
            const urlParams = new URLSearchParams(window.location.search);
            const codigo = urlParams.get('codigo') || 'Desconocido';

            document.getElementById("estado").innerText = "Enviando confirmación...";

            // Enviamos los datos a nuestro Backend
            fetch('https://script.google.com/macros/s/AKfycbw9PH1zolDWux_ZjOPcZV_alqZyofUHynoL6zx-cVnbB18CjREsiG4_ER3PZqE5kIhyaw/exec', {
    method: 'POST',
    headers: {
        // Esto le permite a Google entenderse con tu computadora local
        'Content-Type': 'text/plain;charset=utf-8' 
    },
    body: JSON.stringify({ codigo: codigo, lat: latitud, lon: longitud })
})
.then(response => {
    document.getElementById("estado").innerText = "¡Escaneo registrado con éxito!";
})
.catch(error => {
    document.getElementById("estado").innerText = "Error al enviar al servidor.";
    console.error(error);
});

        function manejarError(error) {
            document.getElementById("estado").innerText = "Es necesario permitir la ubicación para registrar el escaneo.";
        }
    </script>
</body>
</html>
